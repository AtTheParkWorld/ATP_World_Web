<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="ATP The Park">
  <!-- Outer ring: ATP green, no fill -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#7AC231" stroke-width="14"/>
  <!-- Stylized 'a' mark — architectural strokes -->
  <g fill="#7AC231">
    <!-- Top diagonal sweep (the arrow-like top of the 'a') -->
    <polygon points="55,68 132,68 132,86 86,86 73,86"/>
    <!-- Right vertical pillar -->
    <rect x="119" y="68" width="14" height="78"/>
    <!-- Middle bowl crossbar -->
    <rect x="55" y="103" width="78" height="14"/>
    <!-- Bottom bar -->
    <rect x="55" y="132" width="78" height="14"/>
    <!-- Left short vertical (closing the lower bowl) -->
    <rect x="55" y="103" width="14" height="43"/>
  </g>
</svg>
