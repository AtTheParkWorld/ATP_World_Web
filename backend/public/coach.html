<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/atp.min.css">
  <link rel="preload" as="image" href="/atp-logo-transparent.webp" type="image/webp">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Profile · AT THE PARK</title>
<meta name="description" content="ATP Coach Profile — Book sessions with certified coaches across Dubai, Al Ain and Muscat.">
<style>
:root{
  --green:#7AC231;
  --green-dark:#4a7a1d;
  --bg:#050505;
  --card:#0d0d0d;
  --border:#1a1a1a;
  --text:#fff;
  --muted:#888;
  --ff-display:'Impact','Arial Black',sans-serif;
  --ff-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--ff-body);line-height:1.6;min-height:100vh}
a{color:var(--green);text-decoration:none}
.container{max-width:960px;margin:0 auto;padding:20px}

/* Header */
.site-header{background:rgba(5,5,5,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.site-logo{font-family:var(--ff-display);font-size:22px;font-weight:900;letter-spacing:.05em}
.site-logo span{color:var(--green)}
.site-nav a{margin-left:20px;color:var(--muted);font-size:13px;transition:color .2s}
.site-nav a:hover{color:var(--text)}

/* Hero */
.coach-hero{background:linear-gradient(135deg,#0d1a0a 0%,#1a3e0a 40%,#2d4a0f 100%);border-radius:24px;padding:48px 40px;margin-top:24px;position:relative;overflow:hidden;border:1px solid var(--border)}
.coach-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(122,194,49,.15),transparent 50%);pointer-events:none}
.featured-ribbon{position:absolute;top:0;left:0;background:var(--green);color:#0a0a0a;padding:8px 22px 8px 18px;font-size:12px;font-weight:900;letter-spacing:.12em;border-bottom-right-radius:12px}

.hero-flex{display:flex;gap:32px;align-items:center;flex-wrap:wrap;position:relative}
.hero-avatar{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900;color:#0a0a0a;flex-shrink:0;border:4px solid rgba(122,194,49,.3);box-shadow:0 12px 36px rgba(122,194,49,.3)}
.hero-name{font-family:var(--ff-display);font-size:40px;font-weight:900;line-height:1;margin-bottom:8px}
.hero-meta{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:14px}
.hero-rating{margin-bottom:14px}
.hero-rating .star{font-size:22px;margin-right:1px}
.hero-rating .score{margin-left:12px;font-size:14px;font-weight:700}
.hero-rating .count{color:rgba(255,255,255,.5);font-size:13px;margin-left:6px}

.social-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.social-btn{background:rgba(0,0,0,.3);color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;border:1px solid rgba(255,255,255,.15);transition:all .2s;display:inline-flex;gap:6px;align-items:center}
.social-btn:hover{background:rgba(122,194,49,.2);border-color:var(--green)}

/* Stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:32px 0;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.stat-cell{padding:24px 16px;text-align:center;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-val{font-family:var(--ff-display);font-size:36px;font-weight:900;color:var(--green);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:8px;text-transform:uppercase;letter-spacing:.1em}

/* Content */
.section{margin-bottom:36px}
.section-title{font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:700;text-transform:uppercase;letter-spacing:.12em}

.bio{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;font-size:15px;color:#ccc;line-height:1.8}

.tag-row{display:flex;flex-wrap:wrap;gap:8px}
.tag{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.tag-specialty{background:rgba(122,194,49,.12);color:var(--green);border:1px solid rgba(122,194,49,.3)}
.cert-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.cert-check{color:var(--green);font-size:18px}
.lang-tag{display:inline-block;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;color:#ccc;margin:3px 6px 3px 0}

/* Sessions grid */
.session-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s}
.session-card:hover{border-color:var(--green)}
.session-name{font-weight:700;font-size:15px;margin-bottom:3px}
.session-time{font-size:12px;color:var(--muted)}
.session-count{text-align:right}
.session-count .num{font-size:15px;font-weight:800;color:var(--green)}
.session-count .lbl{font-size:10px;color:var(--muted)}

/* Reviews */
.review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.review-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.review-left{display:flex;gap:10px;align-items:center}
.review-avatar{width:36px;height:36px;border-radius:50%;background:#1a2a0a;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.review-name{font-size:13px;font-weight:700}
.review-date{font-size:11px;color:var(--muted)}
.review-rating{font-size:15px;color:gold}
.review-comment{font-size:14px;color:#aaa;line-height:1.6}

/* Book CTA */
.book-cta{display:flex;justify-content:center;margin:40px 0}
.book-btn{background:var(--green);color:#0a0a0a;padding:16px 36px;border-radius:12px;font-family:var(--ff-display);font-size:16px;font-weight:900;letter-spacing:.05em;text-decoration:none;display:inline-flex;gap:10px;align-items:center;transition:transform .2s,box-shadow .2s}
.book-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(122,194,49,.3)}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--muted)}

@media (max-width:640px){
  .hero-name{font-size:28px}
  .hero-avatar{width:100px;height:100px;font-size:32px}
  .stats-strip{grid-template-columns:repeat(2,1fr)}
  .stat-cell:nth-child(2){border-right:none}
  .stat-cell:nth-child(1),.stat-cell:nth-child(2){border-bottom:1px solid var(--border)}
  .coach-hero{padding:32px 24px}
}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-logo">AT THE <span>PARK</span></div>
  <nav class="site-nav">
    <a href="/">Home</a>
    <a href="/sessions.html">Sessions</a>
    <a href="/community.html">Community</a>
  </nav>
</header>

<div class="container">
  <div id="coachContent">
    <div class="loading">Loading coach profile…</div>
  </div>
</div>

<script>
var ATP_API = '/api';
var urlParams = new URLSearchParams(window.location.search);
var coachId = urlParams.get('id');

if (!coachId) {
  document.getElementById('coachContent').innerHTML = '<div class="loading">Coach not found.</div>';
} else {
  loadCoachProfile(coachId);
}

async function loadCoachProfile(id) {
  try {
    var res = await fetch(ATP_API + '/coaches/' + id);
    var data = await res.json();
    if (!data.coach) {
      document.getElementById('coachContent').innerHTML = '<div class="loading">Coach not found.</div>';
      return;
    }
    renderCoach(data);
  } catch(e) {
    document.getElementById('coachContent').innerHTML = '<div class="loading">Unable to load profile.</div>';
  }
}

function renderCoach(data) {
  var c = data.coach;
  var name = (c.first_name||'') + ' ' + (c.last_name||'');
  var ini = ((c.first_name||'?')[0]+(c.last_name||'?')[0]).toUpperCase();
  var rating = parseFloat(c.rating_avg) || 0;

  // Stars
  var stars = '';
  for (var i = 1; i <= 5; i++) {
    stars += '<span class="star" style="color:' + (i <= rating ? 'gold' : 'rgba(255,255,255,.2)') + '">★</span>';
  }
  var ratingHtml = stars +
    '<span class="score">' + (rating ? rating.toFixed(1) + ' / 5' : 'New Coach') + '</span>' +
    (c.rating_count ? '<span class="count">(' + c.rating_count + ' review' + (c.rating_count>1?'s':'') + ')</span>' : '');

  // Meta
  var metaParts = [];
  if (c.city_name) metaParts.push('📍 ' + c.city_name);
  if (c.years_experience) metaParts.push('⏱ ' + c.years_experience + ' year' + (c.years_experience>1?'s':'') + ' experience');
  var metaHtml = metaParts.join(' · ');

  // Social
  var socialHtml = '';
  if (c.instagram) socialHtml += '<a href="https://instagram.com/' + c.instagram + '" target="_blank" class="social-btn">📷 @' + c.instagram + '</a>';
  if (c.tiktok) socialHtml += '<a href="https://tiktok.com/@' + c.tiktok + '" target="_blank" class="social-btn">🎵 @' + c.tiktok + '</a>';

  // Parse JSON arrays safely
  var parseArr = function(v){ try{ return Array.isArray(v)?v:JSON.parse(v||'[]'); }catch(e){ return []; } };
  var specs = parseArr(c.specialties);
  var certs = parseArr(c.certifications);
  var langs = parseArr(c.languages);

  // Sessions
  var sess = data.upcoming_sessions || [];
  var sessHtml = sess.length
    ? sess.map(function(s) {
        var dt = s.scheduled_at ? new Date(s.scheduled_at).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
        return '<div class="session-card"><div><div class="session-name">' + s.name + '</div><div class="session-time">' + dt + '</div></div><div class="session-count"><div class="num">' + s.registered + ' / ' + s.capacity + '</div><div class="lbl">booked</div></div></div>';
      }).join('')
    : '<div class="bio" style="color:#555;font-style:italic;text-align:center">No upcoming sessions scheduled.</div>';

  // Reviews
  var feedback = data.feedback || [];
  var reviewsHtml = feedback.length
    ? feedback.map(function(f) {
        var st = '';
        for (var i=1;i<=5;i++) st += '<span style="color:' + (i<=f.rating?'gold':'#333') + '">★</span>';
        var dt = f.created_at ? new Date(f.created_at).toLocaleDateString('en-GB',{month:'short',year:'numeric'}) : '';
        var revInitials = ((f.first_name||'?')[0]+(f.last_name||'?')[0]).toUpperCase();
        return '<div class="review-card"><div class="review-head"><div class="review-left"><div class="review-avatar">' + revInitials + '</div><div><div class="review-name">' + f.first_name + ' ' + f.last_name + '</div><div class="review-date">' + dt + '</div></div></div><div class="review-rating">' + st + '</div></div>' + (f.comment ? '<div class="review-comment">' + f.comment + '</div>' : '') + '</div>';
      }).join('')
    : '<div class="bio" style="color:#555;font-style:italic;text-align:center">No reviews yet.</div>';

  document.getElementById('coachContent').innerHTML =
    '<section class="coach-hero">' +
      (c.is_featured ? '<div class="featured-ribbon">⭐ FEATURED COACH</div>' : '') +
      '<div class="hero-flex">' +
        '<div class="hero-avatar">' + ini + '</div>' +
        '<div style="flex:1;min-width:260px">' +
          '<h1 class="hero-name">' + name.trim() + '</h1>' +
          '<div class="hero-meta">' + metaHtml + '</div>' +
          '<div class="hero-rating">' + ratingHtml + '</div>' +
          '<div class="social-row">' + socialHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</section>' +
    '<div class="stats-strip">' +
      '<div class="stat-cell"><div class="stat-val">' + (c.total_sessions||0) + '</div><div class="stat-label">Sessions<br>Delivered</div></div>' +
      '<div class="stat-cell"><div class="stat-val">' + (c.upcoming_sessions||0) + '</div><div class="stat-label">Upcoming<br>Sessions</div></div>' +
      '<div class="stat-cell"><div class="stat-val">' + (c.rating_count||0) + '</div><div class="stat-label">Member<br>Reviews</div></div>' +
      '<div class="stat-cell"><div class="stat-val">' + (c.points_balance||0).toLocaleString() + '</div><div class="stat-label">ATP<br>Points</div></div>' +
    '</div>' +
    (c.bio ? '<section class="section"><div class="section-title">About</div><div class="bio">' + c.bio + '</div></section>' : '') +
    (specs.length ? '<section class="section"><div class="section-title">🎯 Specialties</div><div class="tag-row">' + specs.map(function(s){return '<span class="tag tag-specialty">' + s + '</span>';}).join('') + '</div></section>' : '') +
    (certs.length ? '<section class="section"><div class="section-title">🏆 Certifications</div>' + certs.map(function(s){return '<div class="cert-card"><span class="cert-check">✓</span><span>' + s + '</span></div>';}).join('') + '</section>' : '') +
    (langs.length ? '<section class="section"><div class="section-title">🌐 Languages</div>' + langs.map(function(l){return '<span class="lang-tag">' + l + '</span>';}).join('') + '</section>' : '') +
    '<section class="section"><div class="section-title">📅 Upcoming Sessions</div>' + sessHtml + '</section>' +
    '<div class="book-cta"><a href="/sessions.html?coach=' + c.id + '" class="book-btn">📅 Book a Session</a></div>' +
    '<section class="section"><div class="section-title">💬 Member Reviews</div>' + reviewsHtml + '</section>';

  document.title = name.trim() + ' · ATP Coach';
}
</script>
</body>
</html>
