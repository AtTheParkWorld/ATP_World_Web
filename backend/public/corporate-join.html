<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join ATP via your company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#A8FF00;--green-dark:#8FD800;--green-light:#C6FF55;
  --black:#0a0a0a;--dark:#111111;--dark2:#1a1a1a;
  --muted:#888888;--light:#aaaaaa;--white:#ffffff;
  --ff-display:'Barlow Condensed',sans-serif;--ff-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:var(--ff-body);background:radial-gradient(60% 80% at 20% 10%,rgba(168,255,0,.10) 0%,transparent 60%),var(--black);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;width:100%;background:var(--dark2);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 32px}
.brand{display:flex;align-items:center;gap:10px;color:var(--green);font-weight:800;letter-spacing:.16em;font-size:11px;text-transform:uppercase;margin-bottom:18px}
.brand::before{content:'';display:block;width:24px;height:2px;background:var(--green)}
h1{font-family:var(--ff-display);font-size:36px;font-weight:900;line-height:1.05;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:14px}
h1 .acc{color:var(--green)}
.lead{font-size:15px;color:var(--light);line-height:1.55;margin-bottom:24px}
.input{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:14px 16px;color:#fff;font-size:16px;font-family:inherit;margin-bottom:10px}
.input:focus{outline:none;border-color:rgba(168,255,0,.4)}
.btn{width:100%;background:var(--green);color:#0a0a0a;padding:16px;border-radius:8px;font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;border:none;cursor:pointer;margin-top:12px}
.btn:hover{background:var(--green-light)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:#f87171;font-size:13px;margin-top:10px;padding:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;display:none}
.err.show{display:block}
.muted{color:var(--muted);font-size:12px;text-align:center;margin-top:18px}
.muted a{color:var(--green);text-decoration:none}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="brand">ATP × Corporate</div>
  <div id="content">
    <div style="text-align:center;padding:30px;color:var(--muted)">Loading your invite…</div>
  </div>
</div>

<script>
(function(){
  var TOKEN = window.location.pathname.replace(/^\/corporate\/join\/?/, '').replace(/\/$/, '');
  var content = document.getElementById('content');

  function escape(s){ return String(s == null ? '' : s).replace(/[<>&]/g, ''); }

  fetch('/api/corporate/public/token/' + encodeURIComponent(TOKEN))
    .then(function(r){ return r.json().then(function(d){ return { ok: r.ok, body: d }; }); })
    .then(function(out){
      if (!out.ok) { renderError(out.body.error || 'Invite link not valid'); return; }
      var c = out.body.company;
      renderForm(c);
    })
    .catch(function(){ renderError('Couldn\'t reach the server.'); });

  function renderForm(company){
    content.innerHTML =
      '<h1>Join <span class="acc">' + escape(company.name) + '</span> on ATP</h1>' +
      '<p class="lead">You\'re joining your company\'s ATP corporate plan. All ATP sessions free, unlimited.</p>' +
      '<p class="lead" style="font-size:13px;color:var(--muted)">Already have an ATP account? Log in first, then come back to this link. New to ATP? Sign up first (takes 30 seconds), then return here.</p>' +
      '<input type="text" class="input" id="dept" placeholder="Department (optional, e.g. Marketing)" maxlength="120">' +
      '<input type="text" class="input" id="empid" placeholder="Employee ID (optional, your HR\'s internal ID)" maxlength="120">' +
      '<button class="btn" id="joinBtn">Confirm I work at ' + escape(company.name) + ' →</button>' +
      '<div class="err" id="err"></div>' +
      '<p class="muted">Not signed in? <a href="/join?next=' + encodeURIComponent(location.pathname) + '">Sign in / create your free ATP account</a> first.</p>';

    document.getElementById('joinBtn').addEventListener('click', function(){
      var btn = this; btn.disabled = true; btn.textContent = 'Joining…';
      var token = (typeof localStorage !== 'undefined' && localStorage.getItem('atp_token')) || '';
      if (!token) { showErr('Please log in to your ATP account first, then come back to this link.'); btn.disabled = false; btn.textContent = 'Confirm →'; return; }
      fetch('/api/corporate/public/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({
          token: TOKEN,
          department: document.getElementById('dept').value || null,
          employee_external_id: document.getElementById('empid').value || null,
        }),
      })
        .then(function(r){ return r.json().then(function(d){ return { ok: r.ok, body: d }; }); })
        .then(function(out){
          if (!out.ok) { showErr(out.body.error || 'Failed'); btn.disabled = false; btn.textContent = 'Confirm →'; return; }
          content.innerHTML = '<h1>You\'re <span class="acc">in.</span></h1>' +
            '<p class="lead">Welcome to ATP × ' + escape(company.name) + '. All sessions are now free for you, unlimited. Your HR will see anonymised participation in their monthly report.</p>' +
            '<a href="/sessions" class="btn" style="text-decoration:none;text-align:center;display:block">Find your first session →</a>';
        })
        .catch(function(){ showErr('Network glitch — try again.'); btn.disabled = false; btn.textContent = 'Confirm →'; });
    });
  }
  function showErr(msg){ var el = document.getElementById('err'); if (el){ el.textContent = msg; el.classList.add('show'); } }
  function renderError(msg){
    content.innerHTML = '<h1>Invite <span class="acc">not valid.</span></h1>' +
      '<p class="lead">' + escape(msg) + '</p>' +
      '<p class="muted">If you think this is wrong, ask your HR contact for a fresh link, or email <a href="mailto:partners@atthepark.world">partners@atthepark.world</a>.</p>';
  }
})();
</script>

</body>
</html>
