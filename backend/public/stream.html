<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/atp.min.css">
  <script src="/atp.bundle.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Now · At The Park</title>
  <meta name="description" content="Live community and coaching streams from At The Park. Watch ATP coaches and ambassadors training live.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#7AC231;--green-dark:#5a9a1f;--green-light:#a8e055;
  --black:#0a0a0a;--dark:#111111;--dark2:#1a1a1a;--dark3:#222222;
  --muted:#888888;--light:#aaaaaa;--white:#ffffff;
  --red:#ef4444;
  --ff-display:'Barlow Condensed',sans-serif;--ff-body:'DM Sans',sans-serif;
  --nav-h:68px;--max:1320px;--radius:8px;--radius-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff-body);background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
main{flex:1}
a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:var(--ff-body);background:none;border:none;color:inherit}

#nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;padding:0 40px;transition:background .3s,border-color .3s;border-bottom:1px solid transparent}
#nav.scrolled{background:rgba(10,10,10,.97);border-bottom-color:rgba(122,194,49,.18);backdrop-filter:blur(16px)}

.stream-hero{padding:calc(var(--nav-h) + 56px) 40px 36px;background:linear-gradient(180deg,#150d0d 0%,var(--black) 100%);border-bottom:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
.stream-hero-inner{max-width:var(--max);margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
.stream-hero-left{flex:1;min-width:260px}
.stream-hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:inline-flex;align-items:center;gap:10px}
.stream-hero-eyebrow .pulse{width:9px;height:9px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{opacity:.6;transform:scale(.85);box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.stream-hero h1{font-family:var(--ff-display);font-size:clamp(40px,5vw,68px);font-weight:900;line-height:.95;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:10px}
.stream-hero-sub{font-size:15px;color:var(--light);line-height:1.6;max-width:560px;font-weight:300}
.stream-hero-cta{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;border-radius:var(--radius);background:var(--red);color:#fff;transition:background .2s,transform .15s,box-shadow .15s;flex-shrink:0;border:none}
.stream-hero-cta:hover{background:#dc2626;transform:translateY(-2px);box-shadow:0 14px 32px rgba(239,68,68,.35)}
.stream-hero-cta svg{width:14px;height:14px}

.stream-filter{padding:24px 40px 0;max-width:var(--max);margin:0 auto;display:flex;gap:10px;flex-wrap:wrap}
.stream-filter button{padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:999px;background:var(--dark2);border:1px solid rgba(255,255,255,.08);color:var(--light);transition:all .2s}
.stream-filter button.on{background:var(--green);color:#0a0a0a;border-color:var(--green)}
.stream-filter button:not(.on):hover{border-color:rgba(255,255,255,.2);color:#fff}

.stream-grid-wrap{padding:32px 40px 80px;max-width:var(--max);margin:0 auto}
.stream-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:22px}
.stream-card{position:relative;background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;display:flex;flex-direction:column}
.stream-card:hover{transform:translateY(-4px);border-color:rgba(122,194,49,.4);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.stream-card.locked{cursor:default;opacity:.78}
.stream-card.locked:hover{transform:none;border-color:rgba(255,255,255,.06);box-shadow:none}
.stream-thumb{position:relative;aspect-ratio:16/9;background:linear-gradient(135deg,#1a3015 0%,#0d1a0a 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
.stream-thumb-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55;filter:saturate(.9)}
.stream-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(10,10,10,.7) 100%)}
.stream-thumb-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:2;color:rgba(255,255,255,.9)}
.stream-thumb-play{width:64px;height:64px;border-radius:50%;background:rgba(122,194,49,.18);backdrop-filter:blur(8px);border:2px solid rgba(122,194,49,.5);display:flex;align-items:center;justify-content:center}
.stream-thumb-play svg{width:24px;height:24px;color:#fff;margin-left:3px}
.stream-card.locked .stream-thumb-play{background:rgba(0,0,0,.35);border-color:rgba(255,255,255,.2)}
.stream-card.locked .stream-thumb-play svg{margin-left:0}
.stream-live-pill{position:absolute;top:14px;left:14px;display:inline-flex;align-items:center;gap:6px;padding:4px 10px;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;background:var(--red);color:#fff;border-radius:6px;z-index:2;box-shadow:0 4px 12px rgba(239,68,68,.4)}
.stream-live-pill .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.4s ease-in-out infinite}
.stream-viewer-pill{position:absolute;top:14px;right:14px;display:inline-flex;align-items:center;gap:5px;padding:4px 9px;font-size:11px;font-weight:700;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);color:#fff;border-radius:6px;z-index:2}
.stream-viewer-pill svg{width:11px;height:11px}
.stream-tier-pill{position:absolute;bottom:14px;left:14px;display:inline-flex;align-items:center;gap:5px;padding:4px 9px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:rgba(122,194,49,.18);color:var(--green-light);border:1px solid rgba(122,194,49,.4);border-radius:6px;z-index:2;backdrop-filter:blur(8px)}
.stream-tier-pill.plus{background:rgba(96,165,250,.18);color:#93c5fd;border-color:rgba(96,165,250,.4)}
.stream-info{padding:18px 18px 20px}
.stream-host-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;color:var(--muted)}
.stream-host-av{width:24px;height:24px;border-radius:50%;background:var(--dark3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.stream-host-av img{width:100%;height:100%;object-fit:cover}
.stream-host-name{color:#fff;font-weight:600}
.stream-host-role{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green)}
.stream-title{font-family:var(--ff-display);font-size:22px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:8px;letter-spacing:.005em}
.stream-desc{font-size:13px;color:var(--light);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.stream-locked-cta{margin-top:12px;font-size:12px;color:var(--green);font-weight:700;display:inline-flex;align-items:center;gap:4px}
.stream-locked-cta::after{content:'→'}

.stream-empty{padding:80px 20px;text-align:center;background:var(--dark2);border:1px dashed rgba(255,255,255,.1);border-radius:var(--radius-lg)}
.stream-empty-icon{font-size:48px;margin-bottom:14px;opacity:.5}
.stream-empty h2{font-family:var(--ff-display);font-size:28px;font-weight:800;text-transform:uppercase;margin-bottom:8px}
.stream-empty p{font-size:14px;color:var(--light);max-width:420px;margin:0 auto;line-height:1.6}

footer{background:var(--dark);padding:36px 40px 24px;border-top:1px solid rgba(255,255,255,.06);text-align:center}
footer p{font-size:12px;color:var(--muted);margin:0}

@media(max-width:900px){
  #nav{padding:0 20px}
  .stream-hero{padding:calc(var(--nav-h) + 36px) 20px 28px}
  .stream-filter,.stream-grid-wrap{padding-left:20px;padding-right:20px}
  .stream-grid{grid-template-columns:1fr;gap:14px}
}

.loading{padding:80px 0;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div id="atp-nav-host" data-active="stream"></div>

<main>
  <section class="stream-hero">
    <div class="stream-hero-inner">
      <div class="stream-hero-left">
        <div class="stream-hero-eyebrow"><span class="pulse"></span> Live now</div>
        <h1>Train with the pack — <span style="color:var(--green)">live.</span></h1>
        <p class="stream-hero-sub">Coaches and ambassadors going live. Community sessions for Premium members, coaching sessions for Premium Plus. Click any tile to join the stream.</p>
      </div>
      <button class="stream-hero-cta" id="goLiveBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        Go Live
      </button>
    </div>
  </section>

  <div class="stream-filter">
    <button class="on" data-type="all">All</button>
    <button data-type="community">Community</button>
    <button data-type="coaching">Coaching</button>
  </div>

  <section class="stream-grid-wrap">
    <div class="stream-grid" id="streamGrid">
      <div class="loading" style="grid-column:1/-1">Loading live streams…</div>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 At The Park. All rights reserved. Dubai, United Arab Emirates.</p>
</footer>

<script>
(function() {
  'use strict';

  // Nav scroll state
  window.addEventListener('scroll', function(){
    var n = document.getElementById('nav');
    if (n) n.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  var STATE = { streams: [], filter: 'all', member: null };

  // Show "Go Live" only to coaches / ambassadors / admins. Pulled from
  // the cached member object so the button shows up without waiting on
  // the async /auth/me call.
  function showGoLiveIfPermitted() {
    var btn = document.getElementById('goLiveBtn');
    if (!btn) return;
    var m = STATE.member;
    if (!m) return;
    if (m.is_admin || m.is_ambassador || m.is_coach) {
      btn.style.display = '';
      btn.onclick = function(){ window.location.href = '/stream-broadcast.html'; };
    }
  }

  function timeAgo(iso) {
    try {
      var d = new Date(iso); var diff = Math.max(0, (Date.now() - d.getTime()) / 1000);
      if (diff < 60) return Math.floor(diff) + 's ago';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      return Math.floor(diff/3600) + 'h ago';
    } catch(e) { return ''; }
  }

  function renderCard(s) {
    var locked = s.is_locked;
    var hostName = ((s.first_name || '') + ' ' + (s.last_name || '')).trim() || 'ATP';
    var initials = ((s.first_name||'?')[0] + ((s.last_name||'')[0] || '')).toUpperCase();
    var photoHtml = s.host_photo
      ? '<img src="' + esc(s.host_photo) + '" alt="">'
      : esc(initials);
    var tierClass = s.tier_required === 'premium_plus' ? 'plus' : '';
    var tierLabel = s.tier_required === 'premium_plus' ? 'Premium Plus' : 'Premium';
    var typeBadge = s.stream_type === 'coaching' ? '🎯 Coaching' : '🌳 Community';
    var lockBlurb = '';
    if (locked) {
      lockBlurb = s.tier_required === 'premium_plus'
        ? '<div class="stream-locked-cta">Upgrade to Premium Plus to watch</div>'
        : '<div class="stream-locked-cta">Upgrade to Premium to watch</div>';
    }
    var playIcon = locked
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    return '<article class="stream-card' + (locked ? ' locked' : '') + '" data-id="' + esc(s.id) + '" data-locked="' + (locked ? '1' : '0') + '">' +
      '<div class="stream-thumb">' +
        (s.host_photo ? '<img class="stream-thumb-photo" src="' + esc(s.host_photo) + '" alt="">' : '') +
        '<span class="stream-live-pill"><span class="dot"></span> Live</span>' +
        '<span class="stream-viewer-pill"><svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3 3-5 6-5s6 2 6 5"/></svg> ' + (s.concurrent_viewers || 0) + '</span>' +
        '<span class="stream-tier-pill ' + tierClass + '">' + esc(tierLabel) + '</span>' +
        '<div class="stream-thumb-overlay">' +
          '<div class="stream-thumb-play">' + playIcon + '</div>' +
          (locked ? '<div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700">Locked</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="stream-info">' +
        '<div class="stream-host-row">' +
          '<div class="stream-host-av">' + photoHtml + '</div>' +
          '<span class="stream-host-name">' + esc(hostName) + '</span>' +
          '<span class="stream-host-role">· ' + esc(s.host_role || 'host') + '</span>' +
          '<span style="margin-left:auto;font-size:11px">' + esc(timeAgo(s.started_at)) + '</span>' +
        '</div>' +
        '<h3 class="stream-title">' + esc(s.title || 'Untitled stream') + '</h3>' +
        '<p class="stream-desc">' + esc(s.description || typeBadge) + '</p>' +
        lockBlurb +
      '</div>' +
    '</article>';
  }

  function render() {
    var grid = document.getElementById('streamGrid');
    if (!grid) return;
    var list = STATE.streams.filter(function(s) {
      if (STATE.filter === 'all') return true;
      return s.stream_type === STATE.filter;
    });
    if (!list.length) {
      grid.innerHTML =
        '<div class="stream-empty" style="grid-column:1/-1">' +
          '<div class="stream-empty-icon">🎥</div>' +
          '<h2>No live streams right now</h2>' +
          '<p>Check back later — coaches and ambassadors go live throughout the week. Premium members get access to community streams; Premium Plus unlocks coaching sessions.</p>' +
        '</div>';
      return;
    }
    grid.innerHTML = list.map(renderCard).join('');
  }

  // Click handler — delegated. Locked cards bounce to /plans.
  document.addEventListener('click', function(ev){
    var card = ev.target.closest('.stream-card');
    if (!card) return;
    if (card.dataset.locked === '1') {
      window.location.href = '/plans.html';
      return;
    }
    var id = card.dataset.id;
    if (id) window.location.href = '/stream-watch.html?id=' + encodeURIComponent(id);
  });

  // Filter toggle
  document.querySelectorAll('.stream-filter button').forEach(function(btn){
    btn.onclick = function() {
      document.querySelectorAll('.stream-filter button').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on');
      STATE.filter = btn.getAttribute('data-type');
      render();
    };
  });

  // Boot — pull /api/streams/live + the cached member object.
  function loadMember() {
    try { return JSON.parse(localStorage.getItem('atp_member') || 'null'); } catch(e) { return null; }
  }

  function tick() {
    var token = ''; try { token = localStorage.getItem('atp_token') || ''; } catch(_){}
    fetch('/api/streams/live', {
      headers: token ? { Authorization: 'Bearer ' + token } : {},
    })
      .then(function(r){ return r.ok ? r.json() : { streams: [] }; })
      .then(function(d){ STATE.streams = (d && d.streams) || []; render(); })
      .catch(function(){ /* keep stale state */ });
  }

  STATE.member = loadMember();
  showGoLiveIfPermitted();
  tick();
  // Poll every 15s so the live list stays current without a hard refresh.
  setInterval(tick, 15_000);
})();
</script>
</body>
</html>
