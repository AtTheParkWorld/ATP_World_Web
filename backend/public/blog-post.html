<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/atp.min.css">
  <link rel="preload" as="image" href="/atp-logo-transparent.webp" type="image/webp">
  <script src="/atp.bundle.min.js"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The ATP Journal · At The Park</title>
<meta name="description" content="A story from the ATP community.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#7AC231;--green-dark:#5a9a1f;--green-light:#a8e055;
  --black:#0a0a0a;--dark:#111111;--dark2:#161616;--dark3:#1f1f1f;
  --muted:#888888;--light:#aaaaaa;--white:#ffffff;
  --line:rgba(255,255,255,.10);--line-soft:rgba(255,255,255,.06);
  --ff-display:'Barlow Condensed',sans-serif;--ff-body:'DM Sans',sans-serif;
  --nav-h:68px;--max:780px;--max-wide:1200px;--radius:8px;--radius-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff-body);background:var(--black);color:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--ff-body);background:none;border:none;color:inherit}

#nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;padding:0 40px;transition:background .3s,border-color .3s;border-bottom:1px solid transparent}
#nav.scrolled{background:rgba(10,10,10,.97);border-bottom-color:rgba(122,194,49,.18);backdrop-filter:blur(16px)}
.nav-inner{width:100%;max-width:var(--max-wide);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px}
.nav-logo img{height:32px;width:auto;display:block}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{font-size:13px;font-weight:500;letter-spacing:.04em;color:var(--light);transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--green)}
.nav-actions{display:flex;align-items:center;gap:12px}
.btn-ghost{font-size:13px;font-weight:600;color:var(--white);border:1px solid rgba(255,255,255,.2);padding:9px 20px;border-radius:var(--radius);background:transparent;transition:border-color .2s;letter-spacing:.03em}
.btn-ghost:hover{border-color:var(--white)}
.btn-primary{font-size:13px;font-weight:700;background:var(--green);color:var(--white);padding:10px 22px;border-radius:var(--radius);border:none;letter-spacing:.03em;transition:background .2s,transform .15s}
.btn-primary:hover{background:var(--green-dark);transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px}

/* States */
.bp-loading,.bp-error{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 24px 60px;gap:14px;color:var(--muted);font-size:14px;text-align:center}
.bp-spinner{width:36px;height:36px;border:3px solid rgba(122,194,49,.18);border-top-color:var(--green);border-radius:50%;animation:bp-spin .9s linear infinite}
@keyframes bp-spin{to{transform:rotate(360deg)}}
.bp-error h1{font-family:var(--ff-display);font-size:36px;font-weight:900;text-transform:uppercase;color:#fff}
.bp-error a{color:var(--green);border-bottom:1px solid rgba(122,194,49,.4);font-weight:600}
.hidden{display:none!important}

/* HERO */
.bp-hero{position:relative;height:min(60vh,560px);min-height:380px;overflow:hidden;margin-top:var(--nav-h)}
.bp-hero-img{position:absolute;inset:0;z-index:0;background:linear-gradient(135deg,#0d1a0a 0%,#1a3e0a 50%,#0a0a0a 100%)}
.bp-hero-img img{width:100%;height:100%;object-fit:cover;display:block}
.bp-hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,.18) 0%,rgba(10,10,10,.55) 60%,rgba(10,10,10,.96) 100%);z-index:1}
.bp-hero-inner{position:relative;z-index:2;height:100%;max-width:var(--max);margin:0 auto;padding:0 24px 48px;display:flex;align-items:flex-end}
.bp-back{position:absolute;top:32px;left:24px;font-size:12px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.04em;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);padding:8px 14px;border-radius:var(--radius);border:1px solid var(--line-soft);transition:color .15s,background .15s}
.bp-back:hover{color:#fff;background:rgba(0,0,0,.6)}
.bp-hero-content{animation:bp-fade .55s ease-out both}
@keyframes bp-fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bp-hero-cat{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:14px;padding:5px 12px;background:rgba(122,194,49,.12);border:1px solid rgba(122,194,49,.36);border-radius:14px}
.bp-hero h1{font-family:var(--ff-display);font-size:clamp(38px,5.4vw,68px);font-weight:900;line-height:.95;text-transform:uppercase;letter-spacing:-.005em;color:#fff;margin-bottom:14px;max-width:760px}
.bp-hero-meta{display:flex;align-items:center;gap:14px;color:rgba(255,255,255,.78);font-size:13px;flex-wrap:wrap}
.bp-hero-meta .author{color:#fff;font-weight:600}
.bp-hero-meta .dot{color:var(--muted)}

/* BODY */
.bp-body-wrap{max-width:var(--max);margin:0 auto;padding:60px 24px 40px;width:100%}
.bp-excerpt{font-size:18px;line-height:1.65;color:rgba(255,255,255,.85);margin-bottom:36px;font-weight:300;border-left:3px solid var(--green);padding-left:24px}
.bp-body{font-size:17px;line-height:1.85;color:rgba(255,255,255,.9);font-weight:300}
.bp-body p{margin-bottom:22px}
.bp-body h2{font-family:var(--ff-display);font-size:32px;font-weight:900;line-height:1;text-transform:uppercase;letter-spacing:-.005em;color:#fff;margin:48px 0 18px}
.bp-body h3{font-size:20px;font-weight:700;color:#fff;margin:36px 0 12px;letter-spacing:-.005em}
.bp-body strong{color:#fff;font-weight:600}
.bp-body em{font-style:italic;color:rgba(255,255,255,.95)}
.bp-body a{color:var(--green);border-bottom:1px solid rgba(122,194,49,.4);transition:border-color .15s}
.bp-body a:hover{border-bottom-color:var(--green)}
.bp-body ul,.bp-body ol{margin:14px 0 22px 24px}
.bp-body li{margin-bottom:8px}
.bp-body img{margin:32px auto;border-radius:var(--radius-lg);max-width:100%;box-shadow:0 16px 36px rgba(0,0,0,.3)}
.bp-body blockquote{margin:32px 0;padding:22px 28px;background:rgba(122,194,49,.04);border-left:3px solid var(--green);border-radius:0 var(--radius-lg) var(--radius-lg) 0;font-family:var(--ff-display);font-size:22px;font-weight:700;line-height:1.35;color:#fff;font-style:italic}
.bp-body hr{border:0;border-top:1px solid var(--line-soft);margin:36px 0}
.bp-body code{background:#161616;padding:2px 8px;border-radius:4px;font-size:.92em;color:#e4e4e4}
.bp-body pre{background:#0d0d0d;border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px 18px;overflow-x:auto;margin:24px 0;font-size:13px;color:#ddd}
.bp-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:36px;padding-top:24px;border-top:1px solid var(--line-soft)}
.bp-tag{font-size:11px;color:var(--green);background:rgba(122,194,49,.06);border:1px solid rgba(122,194,49,.28);padding:5px 12px;border-radius:12px;font-weight:600;letter-spacing:.02em}

/* Share + author */
.bp-share{margin-top:24px;display:flex;gap:8px;flex-wrap:wrap}
.bp-share-btn{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--light);background:var(--dark2);border:1px solid var(--line-soft);padding:9px 16px;border-radius:var(--radius);transition:color .15s,border-color .15s,background .15s;display:inline-flex;align-items:center;gap:8px}
.bp-share-btn:hover{color:#fff;border-color:rgba(255,255,255,.22);background:#1a1a1a}

/* Related posts */
.bp-related{padding:60px 24px 80px;max-width:var(--max-wide);margin:0 auto;width:100%;border-top:1px solid var(--line-soft)}
.bp-related-title{font-family:var(--ff-display);font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:-.005em;color:#fff;margin-bottom:24px}
.bp-related-title .acc{color:var(--green)}
.bp-related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.bp-rel-card{background:var(--dark2);border:1px solid var(--line-soft);border-radius:var(--radius-lg);overflow:hidden;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s,box-shadow .2s}
.bp-rel-card:hover{border-color:rgba(122,194,49,.42);transform:translateY(-3px);box-shadow:0 16px 36px rgba(0,0,0,.3)}
.bp-rel-cover{aspect-ratio:16/10;overflow:hidden;background:linear-gradient(135deg,#0d1a0a,#1a3e0a)}
.bp-rel-cover img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.bp-rel-card:hover .bp-rel-cover img{transform:scale(1.05)}
.bp-rel-body{padding:18px}
.bp-rel-meta{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.04em;margin-bottom:8px}
.bp-rel-title{font-family:var(--ff-display);font-size:18px;font-weight:800;line-height:1.1;text-transform:uppercase;letter-spacing:-.005em;color:#fff}

/* Footer */
.footer-min{background:#0d0d0d;padding:36px 40px 24px;border-top:1px solid var(--line-soft);font-family:var(--ff-body);margin-top:auto}
.footer-min-inner{max-width:1320px;margin:0 auto}
.footer-min-bot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.footer-min-copy{font-size:12px;color:#666;margin:0}
.footer-legal{display:flex;gap:18px}
.footer-legal a{font-size:12px;color:#888;transition:color .2s}
.footer-legal a:hover{color:#fff}

@media (max-width:900px){
  #nav{padding:0 20px}
  .nav-links,.nav-actions{display:none}
  .hamburger{display:flex}
  #nav.mobile-open{height:auto;flex-direction:column;align-items:stretch;background:rgba(10,10,10,.98);padding:0 20px 24px}
  #nav.mobile-open .nav-links{display:flex;flex-direction:column;gap:18px;width:100%;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
  #nav.mobile-open .nav-actions{display:flex;flex-direction:column;width:100%;gap:8px;margin-top:14px}
  .bp-hero{height:auto;min-height:340px;padding-bottom:24px}
  .bp-hero-inner{padding:0 18px 36px}
  .bp-back{top:18px;left:18px}
  .bp-body-wrap{padding:36px 20px 30px}
  .bp-related{padding:40px 20px 60px}
  .bp-related-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="atp-nav-host" data-active=""></div>

<div class="bp-loading" id="bp-loading">
  <div class="bp-spinner"></div>
  <div>Loading post…</div>
</div>

<div class="bp-error hidden" id="bp-error">
  <h1>Post not found</h1>
  <p>This post may have been unpublished or the link may be wrong.</p>
  <p><a href="/blog">← Back to the journal</a></p>
</div>

<main id="bp-article" class="hidden" style="flex:1;display:flex;flex-direction:column">

  <section class="bp-hero">
    <div class="bp-hero-img" id="bp-hero-img"></div>
    <div class="bp-hero-overlay"></div>
    <a class="bp-back" href="/blog">← The journal</a>
    <div class="bp-hero-inner">
      <div class="bp-hero-content">
        <span class="bp-hero-cat" id="bp-cat" style="display:none"></span>
        <h1 id="bp-title">—</h1>
        <div class="bp-hero-meta" id="bp-meta"></div>
      </div>
    </div>
  </section>

  <article class="bp-body-wrap">
    <p class="bp-excerpt" id="bp-excerpt" style="display:none"></p>
    <div class="bp-body" id="bp-body"></div>
    <div class="bp-tags" id="bp-tags" style="display:none"></div>
    <div class="bp-share">
      <a class="bp-share-btn" id="bp-share-twitter"  target="_blank" rel="noopener">𝕏 / Twitter</a>
      <a class="bp-share-btn" id="bp-share-whatsapp" target="_blank" rel="noopener">WhatsApp</a>
      <a class="bp-share-btn" id="bp-share-linkedin" target="_blank" rel="noopener">LinkedIn</a>
      <button class="bp-share-btn" id="bp-share-copy" type="button">Copy link</button>
    </div>
  </article>

  <section class="bp-related" id="bp-related" style="display:none">
    <div class="bp-related-title">More <span class="acc">from the journal</span></div>
    <div class="bp-related-grid" id="bp-related-grid"></div>
  </section>
</main>

<footer class="footer-min" role="contentinfo">
  <div class="footer-min-inner">
    <div class="footer-min-bot">
      <p class="footer-min-copy">© 2026 At The Park. All rights reserved. Dubai, United Arab Emirates.</p>
      <nav class="footer-legal" aria-label="Legal">
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
        <a href="/contacts.html">Contacts</a>
      </nav>
    </div>
  </div>
</footer>

<script>
(function () {
  'use strict';

  window.addEventListener('scroll', function () {
    var n = document.getElementById('nav');
    if (n) n.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function show(id) { var el = document.getElementById(id); if (el) el.classList.remove('hidden'); }
  function hide(id) { var el = document.getElementById(id); if (el) el.classList.add('hidden'); }
  function setText(id, v) { var el = document.getElementById(id); if (el && v != null && v !== '') el.textContent = v; }

  /* Render the post body. We accept either raw HTML (admin's call — they're trusted)
     OR plain text with paragraph breaks (blank lines) + simple markdown niceties:
       - lines starting with `## ` become H2
       - lines starting with `### ` become H3
       - lines starting with `> ` become blockquotes (joined consecutively)
       - **bold**, *italic*, [text](url), inline images via ![alt](url)
     If the body looks like it already has HTML tags, we render it as-is. */
  function renderBody(raw) {
    if (!raw) return '';
    var trimmed = String(raw).trim();
    var hasHtml = /<\/?(p|div|h[1-6]|ul|ol|li|img|video|iframe|figure|blockquote|pre|code|strong|em|a|br|hr|span)\b/i.test(trimmed);
    if (hasHtml) return trimmed; // admin wrote HTML — render it

    // Plain text with light markdown conversion
    function inline(s) {
      return escapeHtml(s)
        .replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, '<img src="$2" alt="$1">')
        .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    }
    var blocks = trimmed.split(/\n\s*\n/);
    return blocks.map(function (block) {
      var t = block.trim();
      if (!t) return '';
      if (/^###\s+/.test(t)) return '<h3>' + inline(t.replace(/^###\s+/, '')) + '</h3>';
      if (/^##\s+/.test(t))  return '<h2>' + inline(t.replace(/^##\s+/, '')) + '</h2>';
      if (/^>\s+/.test(t))   return '<blockquote>' + inline(t.replace(/^>\s+/, '').replace(/\n>\s+/g, ' ')) + '</blockquote>';
      if (/^---+$/.test(t))  return '<hr>';
      // Bullet list — simple
      if (/^[-*]\s+/.test(t)) {
        var items = t.split(/\n[-*]\s+/).map(function (l, i) { return i === 0 ? l.replace(/^[-*]\s+/, '') : l; });
        return '<ul>' + items.map(function (li) { return '<li>' + inline(li) + '</li>'; }).join('') + '</ul>';
      }
      // Default — paragraph with <br> for single line breaks
      return '<p>' + inline(t).replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
  }

  function relTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function authorName(p) {
    if (!p.author) return 'ATP';
    return ((p.author.first_name || '') + ' ' + (p.author.last_name || '')).trim() || 'ATP';
  }

  /* Resolve slug from /blog/:slug */
  var slug = (function () {
    var m = location.pathname.match(/^\/blog\/([^\/?#]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  })();

  if (!slug) {
    hide('bp-loading'); show('bp-error');
    return;
  }

  fetch('/api/blog/' + encodeURIComponent(slug), { cache: 'no-cache' })
    .then(function (r) { if (!r.ok) throw new Error('not_found'); return r.json(); })
    .then(function (data) {
      var p = data.post; if (!p) throw new Error('no_post');
      document.title = p.title + ' · The ATP Journal';
      var heroImg = document.getElementById('bp-hero-img');
      if (p.cover_image_url) heroImg.innerHTML = '<img src="' + escapeHtml(p.cover_image_url) + '" alt="" loading="eager">';
      if (p.category) {
        var catEl = document.getElementById('bp-cat');
        catEl.textContent = p.category;
        catEl.style.display = '';
      }
      setText('bp-title', p.title);

      var meta = [];
      meta.push('<span class="author">' + escapeHtml(authorName(p)) + '</span>');
      meta.push('<span class="dot">·</span>');
      meta.push(escapeHtml(relTime(p.published_at || p.created_at)));
      if (p.view_count > 0) {
        meta.push('<span class="dot">·</span>');
        meta.push(p.view_count + ' read' + (p.view_count === 1 ? '' : 's'));
      }
      document.getElementById('bp-meta').innerHTML = meta.join(' ');

      if (p.excerpt) {
        var ex = document.getElementById('bp-excerpt');
        ex.textContent = p.excerpt;
        ex.style.display = '';
      }
      document.getElementById('bp-body').innerHTML = renderBody(p.body);

      var tags = (p.tags || []);
      if (tags.length) {
        var tagsEl = document.getElementById('bp-tags');
        tagsEl.innerHTML = tags.map(function (t) { return '<span class="bp-tag">' + escapeHtml(t) + '</span>'; }).join('');
        tagsEl.style.display = '';
      }

      // Share links
      var url = location.href;
      var title = p.title;
      var twit = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(title) + '&url=' + encodeURIComponent(url);
      var wa   = 'https://wa.me/?text=' + encodeURIComponent(title + ' — ' + url);
      var li   = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(url);
      document.getElementById('bp-share-twitter').href = twit;
      document.getElementById('bp-share-whatsapp').href = wa;
      document.getElementById('bp-share-linkedin').href = li;
      document.getElementById('bp-share-copy').addEventListener('click', function () {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function () {
            var btn = document.getElementById('bp-share-copy');
            var orig = btn.textContent;
            btn.textContent = '✓ Copied';
            setTimeout(function () { btn.textContent = orig; }, 1600);
          });
        }
      });

      // Related posts
      var related = data.related || [];
      if (related.length) {
        document.getElementById('bp-related-grid').innerHTML = related.map(function (r) {
          var coverHtml = r.cover_image_url
            ? '<img src="' + escapeHtml(r.cover_image_url) + '" alt="" loading="lazy">'
            : '';
          return '<a class="bp-rel-card" href="/blog/' + encodeURIComponent(r.slug) + '">'
            + '<div class="bp-rel-cover">' + coverHtml + '</div>'
            + '<div class="bp-rel-body">'
            +   '<div class="bp-rel-meta">' + escapeHtml(relTime(r.published_at || r.created_at)) + (r.author ? ' · ' + escapeHtml(authorName(r)) : '') + '</div>'
            +   '<div class="bp-rel-title">' + escapeHtml(r.title) + '</div>'
            + '</div>'
            + '</a>';
        }).join('');
        document.getElementById('bp-related').style.display = '';
      }

      hide('bp-loading');
      show('bp-article');
    })
    .catch(function () {
      hide('bp-loading'); show('bp-error');
    });
})();
</script>

</body>
</html>
